# הגדרת האזורים של שומר זמן.
# חשוב: כל zone_id כאן חייב להיות זהה בדיוק ל-zone_id שנשלח מהמאקרו ב-MacroDroid.
# address = כתובת מלאה; משמשת גם כנקודת מוצא לחישוב נסיעה כשאין GPS עדכני.
# wifi_ssids = שמות רשתות ה-Wi-Fi של המקום (התחברות לרשת = הגעת לאזור, מיידית).
# errands = תזכורות קבועות שמוצגות בכניסה לאזור.

zones:
  - id: home
    name: הבית
    address: "האצ\"ל 5, ירושלים"
    lat: 0.0
    lon: 0.0
    wifi_ssids:
      - "MyHomeWifi"              # ← שנה לשם הרשת בבית
    errands: []

  - id: office
    name: המשרד
    address: "מונבז 3, ירושלים"
    lat: 0.0
    lon: 0.0
    wifi_ssids:
      - "10"                      # רשת ה-Wi-Fi של המשרד (נחי, 09.07)
    errands: []
